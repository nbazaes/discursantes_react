services:
  db:
    image: mysql:8.0
    container_name: discursantes_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_discursantes
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discursantes_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 2501
      MYSQLHOST: db
      MYSQLPORT: 3306
      MYSQLDATABASE: db_discursantes
      MYSQLUSER: appuser
      MYSQLPASSWORD: apppass
    ports:
      - "2501:2501"

volumes:
  mysql_data:
