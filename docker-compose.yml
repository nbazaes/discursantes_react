version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: discursantes_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_discursantes
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discursantes_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 2501
      MYSQLHOST: db
      MYSQLPORT: 3306
      MYSQLDATABASE: db_discursantes
      MYSQLUSER: appuser
      MYSQLPASSWORD: apppass
    ports:
      - "2501:2501"

  nginx:
    image: nginx:alpine
    container_name: discursantes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - ./www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    networks:
      - discursantes-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: discursantes-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx
    networks:
      - discursantes-network
    restart: unless-stopped

volumes:
  mysql_data:
  certbot-etc:
  certbot-var:

networks:
  discursantes-network:
    driver: bridge
